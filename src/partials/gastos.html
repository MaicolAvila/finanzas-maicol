<div id="page-gastos" class="page active">
  <div class="sh" style="margin-bottom:18px;"><h2 style="font-family:var(--font-display);font-size:24px;font-weight:300;font-style:italic;">Registro de gastos</h2></div>

  <div class="quick-add">
    <div style="font-size:11px;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;">+ Nuevo gasto</div>
    <div style="display:grid;grid-template-columns:2fr 1.5fr 1.5fr 1.5fr;gap:10px;" class="gastos-form-grid">
      <div class="field"><label>Descripción</label><input type="text" id="g-desc" placeholder="¿En qué gastaste?"></div>
      <div class="field"><label>Monto ($)</label><input type="number" id="g-monto" placeholder="0"></div>
      <div class="field"><label>Fecha</label><input type="date" id="g-fecha"></div>
      <div class="field"><label>Categoría</label>
        <select id="g-cat">
          <option value="Mercado">🛒 Mercado</option>
          <option value="Ingredientes / diario">🥦 Ingredientes / diario</option>
          <option value="Restaurantes / salidas">🍔 Restaurantes / salidas</option>
          <option value="Transporte">🚗 Transporte</option>
          <option value="Entretenimiento">🎮 Entretenimiento</option>
          <option value="Suscripciones">💻 Suscripciones</option>
          <option value="Ropa">👕 Ropa</option>
          <option value="Deporte">⚽ Deporte</option>
          <option value="Salud">💊 Salud</option>
          <option value="Hogar">🏠 Hogar</option>
          <option value="Familia">❤️ Familia</option>
          <option value="Otros">📦 Otros</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1.5fr 1.5fr auto;gap:10px;margin-top:4px;" class="gastos-form-row2">
      <div class="field"><label>Método de pago</label>
        <select id="g-metodo">
          <option value="Rappi">💳 Rappi</option>
          <option value="Finandina">💳 Finandina</option>
          <option value="Débito">🏦 Débito</option>
          <option value="Efectivo">💵 Efectivo</option>
          <option value="Kata">❤️ Kata (pareja)</option>
        </select>
      </div>
      <div class="field"><label>Nota (opcional)</label><input type="text" id="g-nota" placeholder="ej: cumpleaños, emergencia..."></div>
      <div style="padding-top:18px;"><button class="btn" onclick="addGasto()" style="width:100%">Agregar</button></div>
    </div>
  </div>

  <!-- Filtros -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <select id="filtro-mes" style="width:auto;" onchange="renderGastos()">
      <option value="all">Todos los meses</option>
    </select>
    <select id="filtro-cat" style="width:auto;" onchange="renderGastos()">
      <option value="all">Todas las categorías</option>
      <option>Mercado</option><option>Ingredientes / diario</option><option>Restaurantes / salidas</option>
      <option>Transporte</option><option>Entretenimiento</option>
      <option>Suscripciones</option><option>Ropa</option><option>Deporte</option>
      <option>Salud</option><option>Hogar</option><option>Familia</option><option>Otros</option>
    </select>
    <select id="filtro-metodo" style="width:auto;" onchange="renderGastos()">
      <option value="all">Todos los métodos</option>
      <option>Rappi</option><option>Finandina</option><option>Débito</option><option>Efectivo</option><option>Kata</option>
    </select>
    <button class="btn-ghost" onclick="exportarCSV()">↓ Exportar CSV</button>
  </div>

  <div class="card">
    <table class="tbl" id="gastos-table">
      <thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th class="hide-mobile">Método</th><th class="hide-mobile">Nota</th><th style="text-align:right">Monto</th><th></th></tr></thead>
      <tbody id="gastos-body"></tbody>
    </table>
    <div style="display:flex;justify-content:space-between;padding:10px 10px 0;border-top:1px solid var(--border);margin-top:8px;">
      <span style="color:var(--text3);font-size:12px;" id="gastos-count">0 gastos</span>
      <span style="font-weight:500;" id="gastos-total-label">Total: $0</span>
    </div>
  </div>
</div>
