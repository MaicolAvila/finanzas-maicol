<div id="page-pareja" class="page active">
  <div class="sh" style="margin-bottom:18px;"><h2 style="font-family:var(--font-display);font-size:24px;font-weight:300;font-style:italic;">Gastos en pareja</h2></div>

  <div class="grid2" style="margin-bottom:16px;">
    <div class="card-sm">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;">Maicol</div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:300;color:var(--accent);">80%</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">Salario: $6.200.000</div>
      <div style="font-size:12px;color:var(--text3);">Restante estimado: <span id="maicol-restante" style="color:var(--warn)">—</span></div>
    </div>
    <div class="card-sm">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;">Kata</div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:300;color:var(--accent2);">20%</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">Salario: $2.600.000</div>
      <div style="font-size:12px;color:var(--text3);">Restante estimado: <span id="kata-restante" style="color:var(--warn)">—</span></div>
    </div>
  </div>

  <div class="card">
    <div class="sh"><h2>Gastos fijos compartidos</h2><span id="total-pareja-label">Total: $0</span></div>
    <table class="tbl tbl-mobile-cards">
      <thead><tr><th>Gasto</th><th>Total</th><th>Maicol (80%)</th><th>Kata (20%)</th><th></th></tr></thead>
      <tbody id="pareja-tbody"></tbody>
    </table>
    <hr class="divider">
    <div class="inline-form-grid" style="display:grid;grid-template-columns:2fr 1.5fr auto;gap:8px;margin-top:4px;">
      <div class="field" style="margin:0"><label>Gasto</label><input type="text" id="p-gasto" placeholder="ej: Mercado"></div>
      <div class="field" style="margin:0"><label>Valor total ($)</label><input type="number" id="p-valor" placeholder="0"></div>
      <div style="padding-top:18px;"><button class="btn" onclick="addGastoPareja()">+</button></div>
    </div>
  </div>

  <!-- Presupuesto Kata -->
  <div class="card">
    <div class="sh"><h2>Presupuesto Kata</h2><span>$2.600.000/mes</span></div>
    <table class="tbl tbl-mobile-cards">
      <thead><tr><th>Gasto</th><th>Monto</th><th></th></tr></thead>
      <tbody id="kata-tbody"></tbody>
    </table>
    <hr class="divider">
    <div class="inline-form-grid" style="display:grid;grid-template-columns:2fr 1.5fr auto;gap:8px;">
      <div class="field" style="margin:0"><label>Gasto de Kata</label><input type="text" id="k-gasto" placeholder="ej: transporte"></div>
      <div class="field" style="margin:0"><label>Monto ($)</label><input type="number" id="k-valor" placeholder="0"></div>
      <div style="padding-top:18px;"><button class="btn" onclick="addGastoKata()">+</button></div>
    </div>
    <div style="margin-top:14px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);display:flex;justify-content:space-between;font-size:13px;">
      <span style="color:var(--text2)">Restante Kata</span>
      <span id="kata-restante-calc" style="font-weight:500;">—</span>
    </div>
  </div>
</div>
